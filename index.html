<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Racha FC">
<title>Racha FC</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  :root {
    --green: #1D9E75;
    --green-light: #E1F5EE;
    --green-dark: #0F6E56;
    --text: #1a1a1a;
    --text-muted: #6b6b6b;
    --text-hint: #aaa;
    --bg: #f5f5f3;
    --surface: #ffffff;
    --border: rgba(0,0,0,0.1);
    --border-strong: rgba(0,0,0,0.18);
    --radius: 12px;
    --radius-sm: 8px;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: calc(90px + var(--safe-bottom));
  }

  .header {
    background: var(--green);
    color: white;
    padding: 1rem 1.25rem 1.25rem;
    padding-top: calc(1rem + env(safe-area-inset-top, 0px));
  }
  .header h1 { font-size: 22px; font-weight: 600; letter-spacing: -0.3px; }
  .header p { font-size: 13px; opacity: 0.8; margin-top: 2px; }

  .nav {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--surface);
    border-top: 0.5px solid var(--border);
    display: flex;
    padding-bottom: var(--safe-bottom);
    z-index: 100;
  }
  .nav-btn {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    gap: 3px; padding: 10px 0; background: none; border: none;
    font-size: 11px; color: var(--text-hint); cursor: pointer;
  }
  .nav-btn svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
  .nav-btn.active { color: var(--green); }

  .screen { display: none; padding: 1rem 1rem 0; }
  .screen.active { display: block; }

  .card {
    background: var(--surface);
    border-radius: var(--radius);
    border: 0.5px solid var(--border);
    padding: 14px 16px;
    margin-bottom: 10px;
  }

  .form-label { font-size: 12px; color: var(--text-muted); margin-bottom: 5px; display: block; font-weight: 500; text-transform: uppercase; letter-spacing: 0.4px; }
  .form-input {
    width: 100%; padding: 11px 14px;
    border: 0.5px solid var(--border-strong);
    border-radius: var(--radius-sm);
    font-size: 16px; color: var(--text);
    background: var(--surface);
    outline: none; margin-bottom: 14px;
  }
  .form-input:focus { border-color: var(--green); box-shadow: 0 0 0 3px rgba(29,158,117,0.12); }

  /* TOGGLE GOLEIRO */
  .toggle-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; padding: 10px 14px; background: var(--bg); border-radius: var(--radius-sm); border: 0.5px solid var(--border); }
  .toggle-label { font-size: 14px; color: var(--text); display: flex; align-items: center; gap: 6px; }
  .toggle { position: relative; width: 44px; height: 26px; }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .toggle-slider { position: absolute; inset: 0; background: var(--border-strong); border-radius: 99px; cursor: pointer; transition: 0.2s; }
  .toggle-slider:before { content: ''; position: absolute; width: 20px; height: 20px; left: 3px; top: 3px; background: white; border-radius: 50%; transition: 0.2s; }
  .toggle input:checked + .toggle-slider { background: var(--green); }
  .toggle input:checked + .toggle-slider:before { transform: translateX(18px); }

  .stars { display: flex; gap: 4px; margin-bottom: 14px; flex-wrap: wrap; }
  .star-btn {
    width: 28px; height: 28px; border-radius: 50%;
    border: 0.5px solid var(--border);
    background: var(--bg);
    font-size: 11px; font-weight: 600;
    color: var(--text-muted); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.1s;
  }
  .star-btn.selected { background: var(--green); color: white; border-color: var(--green); }

  .btn {
    width: 100%; padding: 13px;
    border-radius: var(--radius-sm);
    font-size: 15px; font-weight: 600;
    cursor: pointer; border: none;
    transition: all 0.15s;
  }
  .btn:active { transform: scale(0.97); }
  .btn-green { background: var(--green); color: white; }
  .btn-outline { background: transparent; border: 1.5px solid var(--green); color: var(--green); }
  .btn-gray { background: var(--bg); color: var(--text); border: 0.5px solid var(--border-strong); }
  .btn-red { background: transparent; border: 1.5px solid #E24B4A; color: #E24B4A; }

  .player-row {
    display: flex; align-items: center;
    justify-content: space-between;
    padding: 12px 0;
    border-bottom: 0.5px solid var(--border);
  }
  .player-row:last-child { border-bottom: none; }
  .player-info .name { font-size: 15px; font-weight: 500; display: flex; align-items: center; gap: 5px; }
  .player-info .note { font-size: 12px; color: var(--text-muted); margin-top: 1px; }
  .note-badge {
    width: 36px; height: 36px; border-radius: 50%;
    background: var(--green-light); color: var(--green-dark);
    font-size: 14px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .gk-badge-list {
    background: #FFF3CD; color: #856404;
    font-size: 10px; font-weight: 700;
    padding: 2px 6px; border-radius: 99px;
    border: 0.5px solid #FFECB5;
  }
  .del-btn {
    background: none; border: none; color: var(--text-hint);
    cursor: pointer; padding: 6px; margin-left: 6px; font-size: 18px;
  }

  .section-title {
    font-size: 12px; font-weight: 600; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 0.5px;
    margin: 1.25rem 0 8px;
  }

  .empty { text-align: center; padding: 3rem 1rem; color: var(--text-muted); }
  .empty-icon { font-size: 48px; margin-bottom: 12px; }
  .empty p { font-size: 14px; }

  .config-row { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
  .config-row label { font-size: 14px; color: var(--text); flex: 1; }
  .size-input {
    width: 64px; text-align: center;
    padding: 8px; border: 0.5px solid var(--border-strong);
    border-radius: var(--radius-sm); font-size: 16px;
    color: var(--text); background: var(--surface);
    outline: none;
  }
  .size-input:focus { border-color: var(--green); }

  /* TEAM RESULT */
  .team-card { border-radius: var(--radius); padding: 14px 16px; margin-bottom: 10px; }
  .team-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .team-name { font-size: 14px; font-weight: 700; }
  .team-avg { font-size: 12px; padding: 3px 10px; border-radius: 99px; font-weight: 600; }
  .team-player { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-top: 1px solid rgba(0,0,0,0.06); font-size: 14px; }
  .team-player-note { font-size: 12px; font-weight: 600; opacity: 0.7; }
  .gk-tag { font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 99px; background: rgba(0,0,0,0.12); margin-left: 5px; }

  /* BALANCE BAR */
  .balance { background: var(--surface); border-radius: var(--radius); border: 0.5px solid var(--border); padding: 14px 16px; margin-bottom: 10px; }
  .balance-label { font-size: 12px; color: var(--text-muted); margin-bottom: 8px; }
  .balance-bars { display: flex; gap: 6px; align-items: flex-end; height: 40px; }
  .balance-bar { flex: 1; border-radius: 4px 4px 0 0; min-height: 8px; }
  .balance-val { font-size: 11px; text-align: center; margin-top: 4px; font-weight: 600; color: var(--text-muted); }

  /* HISTÓRICO */
  .hist-header { display: flex; align-items: center; justify-content: space-between; margin: 1.25rem 0 8px; }
  .hist-header .section-title { margin: 0; }
  .hist-clear { font-size: 12px; color: #E24B4A; background: none; border: none; cursor: pointer; font-weight: 600; }
  .hist-item { background: var(--surface); border-radius: var(--radius); border: 0.5px solid var(--border); padding: 12px 16px; margin-bottom: 8px; }
  .hist-item-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .hist-date { font-size: 11px; color: var(--text-hint); }
  .hist-teams { display: flex; gap: 6px; flex-wrap: wrap; }
  .hist-team-pill { font-size: 11px; padding: 3px 8px; border-radius: 99px; font-weight: 600; }

  /* TOAST */
  .toast {
    position: fixed; bottom: calc(80px + var(--safe-bottom) + 10px);
    left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--text); color: white;
    padding: 10px 20px; border-radius: 99px;
    font-size: 14px; font-weight: 500;
    opacity: 0; transition: all 0.25s;
    pointer-events: none; white-space: nowrap; z-index: 200;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .counter { background: var(--green); color: white; font-size: 11px; font-weight: 700; padding: 1px 6px; border-radius: 99px; margin-left: 4px; }
  .btn-row { display: flex; gap: 8px; margin-bottom: 10px; }
  .btn-row .btn { margin-bottom: 0; }
</style>
</head>
<body>

<div class="header">
  <h1>⚽ Racha FC</h1>
  <p id="header-sub">Gerencie jogadores e sorteie times</p>
</div>

<!-- SCREEN: JOGADORES -->
<div id="screen-players" class="screen active">
  <div class="section-title">Adicionar jogador</div>
  <div class="card">
    <label class="form-label">Nome</label>
    <input class="form-input" id="input-name" type="text" placeholder="Ex: Marcos" autocomplete="off" />

    <div class="toggle-row">
      <span class="toggle-label">🧤 É goleiro?</span>
      <label class="toggle">
        <input type="checkbox" id="toggle-gk" />
        <span class="toggle-slider"></span>
      </label>
    </div>

    <div id="note-section">
      <label class="form-label">Nota geral (1–10)</label>
      <div class="stars" id="stars-container"></div>
    </div>

    <button class="btn btn-green" onclick="addPlayer()">+ Adicionar</button>
  </div>

  <div class="section-title">Jogadores <span class="counter" id="player-count">0</span></div>
  <div id="player-list">
    <div class="empty">
      <div class="empty-icon">👤</div>
      <p>Nenhum jogador ainda.<br>Adicione acima!</p>
    </div>
  </div>
</div>

<!-- SCREEN: SORTEIO -->
<div id="screen-sort" class="screen">
  <div class="section-title">Configurar sorteio</div>
  <div class="card">
    <div class="config-row">
      <label>Jogadores por time (incluindo goleiro)</label>
      <input class="size-input" id="input-size" type="number" value="5" min="2" max="11" />
    </div>
    <button class="btn btn-green" onclick="doSort()">🔀 Sortear agora</button>
  </div>
  <div id="sort-result"></div>

  <div class="hist-header" id="hist-header" style="display:none">
    <div class="section-title">Últimos sorteios</div>
    <button class="hist-clear" onclick="clearHistory()">Limpar histórico</button>
  </div>
  <div id="hist-list"></div>
</div>

<nav class="nav">
  <button class="nav-btn active" id="nav-players" onclick="goTo('players')">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
    Jogadores
  </button>
  <button class="nav-btn" id="nav-sort" onclick="goTo('sort')">
    <svg viewBox="0 0 24 24"><path d="M4 6h16M7 12h10M10 18h4"/></svg>
    Sortear
  </button>
</nav>

<div class="toast" id="toast"></div>

<script>
const TEAM_COLORS = [
  { bg: '#E1F5EE', text: '#0F6E56', bar: '#1D9E75', name: 'Time Verde' },
  { bg: '#E6F1FB', text: '#0C447C', bar: '#185FA5', name: 'Time Azul' },
  { bg: '#FAECE7', text: '#712B13', bar: '#D85A30', name: 'Time Laranja' },
  { bg: '#EEEDFE', text: '#3C3489', bar: '#534AB7', name: 'Time Roxo' },
  { bg: '#FBEAF0', text: '#72243E', bar: '#D4537E', name: 'Time Rosa' },
];

let players = JSON.parse(localStorage.getItem('racha_players') || '[]');
let history = JSON.parse(localStorage.getItem('racha_history') || '[]');
let selectedNote = 0;
let isGk = false;

function save() { localStorage.setItem('racha_players', JSON.stringify(players)); }
function saveHistory() { localStorage.setItem('racha_history', JSON.stringify(history)); }

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function goTo(screen) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('screen-' + screen).classList.add('active');
  document.getElementById('nav-' + screen).classList.add('active');
  if (screen === 'sort') renderHistory();
}

// Toggle goleiro esconde nota
document.getElementById('toggle-gk').addEventListener('change', function() {
  isGk = this.checked;
  document.getElementById('note-section').style.display = isGk ? 'none' : 'block';
  if (isGk) selectedNote = 0;
});

function buildStars() {
  const c = document.getElementById('stars-container');
  c.innerHTML = '';
  for (let i = 1; i <= 10; i++) {
    const b = document.createElement('button');
    b.className = 'star-btn' + (i === selectedNote ? ' selected' : '');
    b.textContent = i;
    b.onclick = () => { selectedNote = i; buildStars(); };
    c.appendChild(b);
  }
}

function renderPlayers() {
  const list = document.getElementById('player-list');
  document.getElementById('player-count').textContent = players.length;
  const gkCount = players.filter(p => p.gk).length;
  document.getElementById('header-sub').textContent =
    players.length === 0 ? 'Adicione jogadores para começar' :
    players.length + ' jogador' + (players.length !== 1 ? 'es' : '') +
    (gkCount > 0 ? ' · ' + gkCount + ' goleiro' + (gkCount !== 1 ? 's' : '') : '');

  if (!players.length) {
    list.innerHTML = '<div class="empty"><div class="empty-icon">👤</div><p>Nenhum jogador ainda.<br>Adicione acima!</p></div>';
    return;
  }

  const sorted = [...players].sort((a,b) => {
    if (a.gk !== b.gk) return a.gk ? -1 : 1;
    return b.note - a.note;
  });

  list.innerHTML = '<div class="card">' +
    sorted.map(p => {
      const origIdx = players.indexOf(p);
      return `<div class="player-row">
        <div class="player-info">
          <div class="name">
            ${p.gk ? '🧤 ' : ''}${p.name}
            ${p.gk ? '<span class="gk-badge-list">GOL</span>' : ''}
          </div>
          <div class="note">${p.gk ? 'Goleiro' : 'Nota ' + p.note + '/10'}</div>
        </div>
        <div style="display:flex;align-items:center;gap:6px">
          ${p.gk ? '<div class="note-badge">🧤</div>' : '<div class="note-badge">' + p.note + '</div>'}
          <button class="del-btn" onclick="removePlayer(${origIdx})" aria-label="Remover ${p.name}">✕</button>
        </div>
      </div>`;
    }).join('') + '</div>';
}

function addPlayer() {
  const name = document.getElementById('input-name').value.trim();
  if (!name) { toast('Digite o nome do jogador'); return; }
  if (!isGk && !selectedNote) { toast('Selecione uma nota'); return; }
  players.push({ name, note: isGk ? 0 : selectedNote, gk: isGk });
  save();
  document.getElementById('input-name').value = '';
  document.getElementById('toggle-gk').checked = false;
  isGk = false;
  selectedNote = 0;
  document.getElementById('note-section').style.display = 'block';
  buildStars();
  renderPlayers();
  toast(name + (isGk ? ' (goleiro)' : '') + ' adicionado!');
}

function removePlayer(i) {
  const name = players[i].name;
  players.splice(i, 1);
  save();
  renderPlayers();
  toast(name + ' removido');
}

function doSort() {
  const size = parseInt(document.getElementById('input-size').value) || 5;
  if (players.length < 4) { toast('Adicione pelo menos 4 jogadores'); return; }

  const goalkeepers = players.filter(p => p.gk).sort(() => Math.random() - 0.5);
  const field = players.filter(p => !p.gk).sort(() => Math.random() - 0.5);

  // Se há goleiros, cada time precisa de (size - 1) jogadores de linha + 1 goleiro
  // Se não há goleiros, divide só pelos jogadores de linha
  const hasGk = goalkeepers.length > 0;
  const fieldPerTeam = hasGk ? size - 1 : size;
  const numTeams = hasGk
    ? Math.min(Math.floor(field.length / fieldPerTeam), goalkeepers.length)
    : Math.floor(field.length / size);

  if (numTeams < 2) {
    if (hasGk) {
      toast('Com ' + size + ' por time, precisa de ' + (fieldPerTeam * 2) + '+ jogadores de linha e 2+ goleiros');
    } else {
      toast('Jogadores insuficientes para ' + size + ' por time');
    }
    return;
  }

  // Monta times: 1 goleiro por time + jogadores de linha
  const teams = Array.from({length: numTeams}, () => []);

  // Distribui goleiros (1 por time)
  goalkeepers.forEach((gk, i) => { if (i < numTeams) teams[i].push(gk); });

  // Preenche com jogadores de linha (fieldPerTeam por time)
  let fi = 0;
  teams.forEach(team => {
    let added = 0;
    while (added < fieldPerTeam && fi < field.length) {
      team.push(field[fi++]);
      added++;
    }
  });

  // Remove times vazios ou com 1 pessoa só
  const validTeams = teams.filter(t => t.length >= 2);

  const avgs = validTeams.map(t => {
    const fieldPlayers = t.filter(p => !p.gk);
    if (!fieldPlayers.length) return 0;
    return fieldPlayers.reduce((s,p) => s+p.note, 0) / fieldPlayers.length;
  });
  const maxAvg = Math.max(...avgs) || 1;

  let html = '';

  // Barra de equilíbrio
  html += `<div class="balance">
    <div class="balance-label">Equilíbrio dos times (média dos jogadores de linha)</div>
    <div class="balance-bars">
      ${validTeams.map((t,i) => {
        const avg = avgs[i];
        const pct = Math.round((avg / maxAvg) * 100);
        return `<div style="flex:1">
          <div class="balance-bar" style="height:${pct}%;background:${TEAM_COLORS[i%TEAM_COLORS.length].bar}"></div>
          <div class="balance-val">${avg.toFixed(1)}</div>
        </div>`;
      }).join('')}
    </div>
  </div>`;

  validTeams.forEach((team, ti) => {
    const c = TEAM_COLORS[ti % TEAM_COLORS.length];
    const avg = avgs[ti].toFixed(1);
    html += `<div class="team-card" style="background:${c.bg}">
      <div class="team-header">
        <div class="team-name" style="color:${c.text}">${c.name}</div>
        <div class="team-avg" style="background:${c.bar};color:white">Média ${avg}</div>
      </div>
      ${team.map(p => `<div class="team-player" style="color:${c.text}">
        <span>${p.gk ? '🧤 ' : ''}${p.name}${p.gk ? '<span class="gk-tag">GOL</span>' : ''}</span>
        <span class="team-player-note">${p.gk ? 'Goleiro' : p.note + '/10'}</span>
      </div>`).join('')}
    </div>`;
  });

  html += `<div class="btn-row">
    <button class="btn btn-outline" onclick="doSort()">🔀 Sortear de novo</button>
  </div>`;

  document.getElementById('sort-result').innerHTML = html;

  // Salva no histórico
  const now = new Date();
  const label = now.toLocaleDateString('pt-BR', {day:'2-digit', month:'2-digit'}) + ' ' + now.toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'});
  history.unshift({ date: label, teams: validTeams.map((t,i) => ({ name: TEAM_COLORS[i%TEAM_COLORS.length].name, bar: TEAM_COLORS[i%TEAM_COLORS.length].bar, bg: TEAM_COLORS[i%TEAM_COLORS.length].bg, text: TEAM_COLORS[i%TEAM_COLORS.length].text, players: t })) });
  if (history.length > 3) history = history.slice(0, 3);
  saveHistory();
  renderHistory();
}

function renderHistory() {
  const header = document.getElementById('hist-header');
  const list = document.getElementById('hist-list');
  if (!history.length) { header.style.display = 'none'; list.innerHTML = ''; return; }
  header.style.display = 'flex';
  list.innerHTML = history.map((h, hi) => `
    <div class="hist-item">
      <div class="hist-item-header">
        <span style="font-size:13px;font-weight:600;color:var(--text)">Sorteio ${history.length - hi}</span>
        <span class="hist-date">${h.date}</span>
      </div>
      ${h.teams.map(t => `
        <div style="margin-bottom:8px">
          <div style="font-size:12px;font-weight:700;color:${t.text};margin-bottom:4px">${t.name}</div>
          <div style="font-size:13px;color:var(--text-muted)">
            ${t.players.map(p => (p.gk ? '🧤 ' : '') + p.name).join(' · ')}
          </div>
        </div>`).join('')}
    </div>`).join('');
}

function clearHistory() {
  history = [];
  saveHistory();
  renderHistory();
  toast('Histórico apagado');
}

buildStars();
renderPlayers();
renderHistory();
</script>
</body>
</html>
